<div
  class="fixed inset-0 z-[9999] bg-black/80 backdrop-blur-md flex justify-center items-center p-4"
  (click)="closeLightbox()">

  <!-- Bouton de fermeture -->
  <button
    (click)="closeLightbox(); $event.stopPropagation()"
    class="absolute top-6 right-6 text-white bg-black/40 hover:bg-black/70
         rounded-full p-3 shadow-lg backdrop-blur-md
         animate-[popIn_0.3s_ease-out]
         hover:animate-[pulseBig_0.6s_ease-in-out_infinite]
    ">
    <svg xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>

  <!-- Image agrandie -->
  <img
    [src]="imageUrl"
    alt="Image agrandie"
    class="max-w-[90vw] max-h-[85vh] object-contain rounded-2xl shadow-2xl border-4 border-gray-200 cursor-pointer"
  />
</div>
