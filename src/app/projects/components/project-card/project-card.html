<div class="bg-white rounded-3xl
         shadow-[0_8px_30px_rgba(0,0,0,0.80)]
         border border-gray-200
         w-full
         py-8 px-8
         sm:py-10 sm:px-12
         transition-all duration-300
         hover:-translate-y-1
         hover:shadow-[0_12px_40px_rgba(0,0,0,0.9)]
         cursor-pointer"
         (click)="viewProjectDetails()">

  <div class="text-3xl font-bold text-gray-900 leading-tight mb-4">
    {{ card.title }}
  </div>

  <div class="flex flex-col md:flex-row gap-8 cursor-">
    <div class="md:w-1/3 flex justify-center items-start">
      <img [src]="card.additionalData?.projectMainImage"
           alt="Image de prévisualisation du projet"
           class="w-full max-w-xs md:max-w-none rounded-xl object-cover shadow-lg border-4 border-gray-100 aspect-video">
    </div>

    <div class="md:w-2/3">
      <p class="text-gray-700 text-lg leading-relaxed mb-6 text-justify">
        {{ card.description }}
      </p>

      <div class="flex flex-wrap gap-3 mt-4">
        @for (chip of card.chips; track chip.textValue) {
          <span class="px-4 py-2 bg-blue-100 text-blue-900
                     rounded-full text-sm font-semibold shadow-sm">
            {{ chip.textValue }}
          </span>
        }
      </div>

      <button class="mt-6 px-4 py-2 bg-blue-600 text-white rounded-lg text-base font-semibold
        flex items-center gap-2 shadow-md hover:bg-blue-900 hover:shadow-lg
      transition-all duration-200 group"
        (click)="viewProjectDetails()">
        Voir les détails
        <span class="w-px h-4 bg-gray-500"></span>
        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 20 20"
             fill="currentColor"
             class="w-4 h-4 transition-all duration-200 group-hover:translate-x-1">
          <path fill-rule="evenodd"
                d="M7.293 4.293a1 1 0 011.414 0l5 5a1 1 0 010 1.414l-5 5a1 1 0 01-1.414-1.414L11.586 10 7.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </div>
</div>
